name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, frontend]

    env:
      APP_DIR: /home/shanmugavel_muthuraj/frontend
      DEPLOY_DIR: /var/www/frontend
      PATH: /usr/local/bin:/usr/bin:/bin:/home/shanmugavel_muthuraj/.npm-global/bin

    steps:
      - name: Debug Environment
        run: |
          whoami
          echo $HOME
          pwd

      - name: Clone or Update Frontend
        run: |
          set -e

          if [ ! -d "$APP_DIR/.git" ]; then
            git clone git@github.com:GWC-Data/nea-cleansmart.git "$APP_DIR"
          fi

          cd "$APP_DIR"

          git fetch origin
          git reset --hard origin/main
          git clean -fd

      - name: Install Dependencies
        run: |
          set -e

          cd "$APP_DIR"

          npm ci

      - name: Build React App
        run: |
          set -e

          cd "$APP_DIR"

          npm run build

      - name: Ensure Nginx Folder Exists
        run: |
          sudo mkdir -p "$DEPLOY_DIR"

      - name: Deploy to Nginx
        run: |
          set -e

          if [ -d "$APP_DIR/dist" ]; then
            sudo rm -rf "$DEPLOY_DIR"/*
            sudo cp -r "$APP_DIR/dist/"* "$DEPLOY_DIR"/
          else
            echo "Build folder not found!"
            exit 1
          fi

      - name: Set Permissions
        run: |
          sudo chown -R www-data:www-data "$DEPLOY_DIR"
          sudo chmod -R 755 "$DEPLOY_DIR"

      - name: Validate and Restart Nginx
        run: |
          sudo nginx -t
          sudo systemctl restart nginx

      - name: Deployment Success
        run: |
          echo "Frontend deployed successfully!"
