name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, frontend]

    steps:
      - name: Get Current User
        run: echo "USER_NAME=$(whoami)" >> $GITHUB_ENV

      - name: Fix Folder Permissions
        run: |
          sudo mkdir -p /home/$USER_NAME/frontend
          sudo chown -R $USER_NAME:$USER_NAME /home/$USER_NAME/frontend

          sudo mkdir -p /var/www/frontend
          sudo chown -R $USER_NAME:$USER_NAME /var/www/frontend

      - name: Setup SSH for GitHub
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -f ~/.ssh/id_ed25519 ]; then
            chmod 600 ~/.ssh/id_ed25519
          fi

          if [ -f ~/.ssh/id_ed25519.pub ]; then
            chmod 644 ~/.ssh/id_ed25519.pub
          fi

          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone or Update Frontend
        run: |
          set -e

          if [ ! -d "/home/$USER_NAME/frontend/.git" ]; then
            rm -rf /home/$USER_NAME/frontend
            git clone git@github.com:GWC-Data/nea-cleansmart.git /home/$USER_NAME/frontend
          fi

          cd /home/$USER_NAME/frontend

          git fetch origin
          git reset --hard origin/main
          git clean -fd

      - name: Install Dependencies
        run: |
          set -e

          cd /home/$USER_NAME/frontend

          npm ci

      - name: Build Frontend
        run: |
          set -e

          cd /home/$USER_NAME/frontend

          npm run build

      - name: Verify Build
        run: |
          cd /home/$USER_NAME/frontend

          echo "Checking dist folder..."
          ls -la dist

      - name: Deploy Frontend to Nginx
        run: |
          set -e

          sudo rm -rf /var/www/frontend/*
          sudo cp -r /home/$USER_NAME/frontend/dist/* /var/www/frontend/

      - name: Set Permissions
        run: |
          sudo chown -R www-data:www-data /var/www/frontend
          sudo chmod -R 755 /var/www/frontend

      - name: Validate and Restart Nginx
        run: |
          sudo nginx -t
          sudo systemctl daemon-reload
          sudo systemctl restart nginx

      - name: Deployment Success
        run: |
          echo "Frontend deployed successfully!"
