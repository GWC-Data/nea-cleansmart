name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Paths
        run: |
          echo "RUNNER_USER=$(whoami)" >> $GITHUB_ENV
          echo "FRONTEND_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "------- DEBUG INFO -------"
          echo "Running as user  : $(whoami)"
          echo "GitHub workspace : $GITHUB_WORKSPACE"
          echo "Repo contents:"
          ls -la $GITHUB_WORKSPACE
          echo "--------------------------"

      - name: Install Dependencies
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          echo "Node version : $(node -v)"
          echo "NPM version  : $(npm -v)"
          npm install

      - name: Build Frontend
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          echo "Building..."
          npm run build
          echo "Build completed."

      - name: Verify Build
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          if [ ! -d "dist" ]; then
            echo "ERROR: dist folder not found!"
            exit 1
          fi
          echo "dist contents:"
          ls -la dist
          echo "dist file count: $(find dist -type f | wc -l)"

      - name: Set Permissions on dist
        run: |
          sudo chown -R www-data:www-data $GITHUB_WORKSPACE/dist
          sudo chmod -R 755 $GITHUB_WORKSPACE/dist

          # Nginx needs execute on all parent dirs to traverse the path
          sudo chmod o+x $HOME
          sudo chmod o+x $GITHUB_WORKSPACE

      - name: Update Nginx root and Restart
        run: |
          DIST_PATH="$GITHUB_WORKSPACE/dist"
          echo "Setting Nginx root to: $DIST_PATH"

          sudo sed -i "s|root .*;|root $DIST_PATH;|g" /etc/nginx/sites-available/frontend

          echo "Testing Nginx config..."
          sudo nginx -t

          echo "Restarting Nginx..."
          sudo systemctl restart nginx

          echo "Nginx status:"
          sudo systemctl status nginx --no-pager

      - name: Deployment Success
        run: |
          echo "============================================"
          echo " Frontend deployed successfully!"
          echo " Runner user : $(whoami)"
          echo " Nginx root  : $GITHUB_WORKSPACE/dist"
          echo " Commit      : $(git log -1 --oneline)"
          echo "============================================"
