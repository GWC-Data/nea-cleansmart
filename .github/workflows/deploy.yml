name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, frontend]

    steps:
      - name: Get Current User and Paths
        run: |
          echo "RUNNER_USER=$(whoami)" >> $GITHUB_ENV
          echo "RUNNER_HOME=$HOME" >> $GITHUB_ENV
          echo "FRONTEND_DIR=$HOME/frontend" >> $GITHUB_ENV
          echo "------- DEBUG INFO -------"
          echo "Running as user : $(whoami)"
          echo "Home directory  : $HOME"
          echo "Frontend path   : $HOME/frontend"
          echo "--------------------------"

      - name: Fix Folder Permissions
        run: |
          sudo mkdir -p $FRONTEND_DIR
          sudo chown -R $RUNNER_USER:$RUNNER_USER $FRONTEND_DIR

          sudo mkdir -p /var/www/frontend
          sudo chown -R $RUNNER_USER:$RUNNER_USER /var/www/frontend

      - name: Setup SSH for GitHub
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -f ~/.ssh/id_ed25519 ]; then
            chmod 600 ~/.ssh/id_ed25519
          fi

          if [ -f ~/.ssh/id_ed25519.pub ]; then
            chmod 644 ~/.ssh/id_ed25519.pub
          fi

          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone or Update Frontend
        run: |
          set -e

          if [ ! -d "$FRONTEND_DIR/.git" ]; then
            echo "No existing repo found. Cloning fresh..."
            rm -rf $FRONTEND_DIR
            git clone git@github.com:GWC-Data/nea-cleansmart.git $FRONTEND_DIR
          else
            echo "Existing repo found. Updating..."
          fi

          cd $FRONTEND_DIR

          git fetch origin
          git reset --hard origin/main
          git clean -fd

          echo "Current commit: $(git log -1 --oneline)"

      - name: Install Dependencies
        run: |
          set -e

          cd $FRONTEND_DIR

          echo "Node version : $(node -v)"
          echo "NPM version  : $(npm -v)"

          npm ci

      - name: Build Frontend
        run: |
          set -e

          cd $FRONTEND_DIR

          npm run build

      - name: Verify Build
        run: |
          set -e

          cd $FRONTEND_DIR

          echo "Checking dist folder at: $FRONTEND_DIR/dist"

          if [ ! -d "$FRONTEND_DIR/dist" ]; then
            echo "ERROR: dist folder not found! Build may have failed."
            exit 1
          fi

          echo "dist folder contents:"
          ls -la dist

          echo "dist file count: $(find dist -type f | wc -l)"

      - name: Deploy Frontend to Nginx
        run: |
          set -e

          echo "Deploying from $FRONTEND_DIR/dist to /var/www/frontend/"

          sudo rm -rf /var/www/frontend/*
          sudo cp -r $FRONTEND_DIR/dist/* /var/www/frontend/

          echo "Deployed files:"
          ls -la /var/www/frontend/

      - name: Set Permissions
        run: |
          sudo chown -R www-data:www-data /var/www/frontend
          sudo chmod -R 755 /var/www/frontend

      - name: Validate and Restart Nginx
        run: |
          echo "Testing Nginx config..."
          sudo nginx -t

          echo "Reloading systemd daemon..."
          sudo systemctl daemon-reload

          echo "Restarting Nginx..."
          sudo systemctl restart nginx

          echo "Nginx status:"
          sudo systemctl status nginx --no-pager

      - name: Deployment Success
        run: |
          echo "============================================"
          echo " Frontend deployed successfully!"
          echo " Runner user : $RUNNER_USER"
          echo " Source      : $FRONTEND_DIR/dist"
          echo " Destination : /var/www/frontend"
          echo " Commit      : $(cd $FRONTEND_DIR && git log -1 --oneline)"
          echo "============================================"
